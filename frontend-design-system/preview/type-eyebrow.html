<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg);color:var(--fg)}
  .card{padding:24px 26px;display:flex;flex-direction:column;gap:18px}
  .stack{display:flex;flex-direction:column;gap:6px}
  .tag{font:var(--w-regular) 11px/1 var(--font-mono);color:var(--fg-subtle)}
  .wts{display:flex;gap:26px;flex-wrap:wrap}
  .wt{font-size:22px}
</style></head>
<body><div class="card">
  <div class="stack">
    <div class="ds-eyebrow">NEW ARRIVALS · 春季新品</div>
    <span class="tag">eyebrow — uppercase · 12px · tracking .16em</span>
  </div>
  <div class="wts">
    <span class="wt" style="font-weight:300">Inter 300</span>
    <span class="wt" style="font-weight:400">Inter 400</span>
    <span class="wt" style="font-weight:500">Inter 500</span>
    <span class="wt" style="font-weight:600">Inter 600</span>
    <span class="wt" style="font-weight:700">Inter 700</span>
  </div>
  <div class="wts">
    <span class="wt" style="font-weight:400">思源黑體 400</span>
    <span class="wt" style="font-weight:500">思源黑體 500</span>
    <span class="wt" style="font-weight:700">思源黑體 700</span>
    <span class="ds-price" style="margin-left:auto">NT$ 1,280</span>
  </div>
</div></body></html>
