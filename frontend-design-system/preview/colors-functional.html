<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg);color:var(--fg)}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{display:flex;flex-direction:column;gap:6px}
  .chip{height:44px;display:flex;align-items:center;justify-content:center;font:var(--w-medium) 12px/1 var(--font-sans)}
  .nm{font:var(--w-medium) 11px/1.3 var(--font-sans)}
  .hx{font:var(--w-regular) 10px/1 var(--font-mono);color:var(--fg-subtle)}
  .note{font:var(--w-regular) 12px/1.4 var(--font-sans);color:var(--fg-muted)}
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#67c23a;color:#fff">在庫 In stock</div><div class="nm">success</div><div class="hx">#67c23a</div></div>
    <div class="sw"><div class="chip" style="background:#e6a23c;color:#fff">低庫存 Low</div><div class="nm">warning</div><div class="hx">#e6a23c</div></div>
    <div class="sw"><div class="chip" style="background:#f56c6c;color:#fff">特價 Sale</div><div class="nm">danger</div><div class="hx">#f56c6c</div></div>
    <div class="sw"><div class="chip" style="background:#909399;color:#fff">資訊 Info</div><div class="nm">info</div><div class="hx">#909399</div></div>
  </div>
  <div class="note">Functional only — stock, validation, sale price, shipping status. Never used decoratively.</div>
</div></body></html>
