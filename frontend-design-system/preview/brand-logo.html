<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg);color:var(--fg)}
  .card{display:grid;grid-template-columns:1.5fr 1fr}
  .light{background:#fff;display:flex;align-items:center;justify-content:center;padding:30px 34px;border-right:1px solid var(--line-300)}
  .light img{height:60px;display:block}
  .meta{display:flex;flex-direction:column;justify-content:center;gap:14px;padding:24px 26px}
  .grad{height:30px;background:linear-gradient(135deg,#4001b0 0%,#950ebb 55%,#d81f8e 100%)}
  .lab{font:var(--w-medium) 11px/1.4 var(--font-sans)}
  .hx{font:var(--w-regular) 10px/1.4 var(--font-mono);color:var(--fg-subtle)}
  .note{font:var(--w-regular) 11px/1.5 var(--font-sans);color:var(--fg-muted)}
</style></head>
<body><div class="card">
  <div class="light"><img src="../assets/logo-evomni.jpg" alt="Evomni"></div>
  <div class="meta">
    <div class="lab">Brand mark gradient</div>
    <div class="grad"></div>
    <div class="hx">#4001B0 → #950EBB → #D81F8E</div>
    <div class="note">Primary lockup: gradient mark + black wordmark on white. Storefront UI stays monochrome; the gradient appears in the logo only.</div>
  </div>
</div></body></html>
