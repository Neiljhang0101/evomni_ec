<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg);color:var(--fg)}
  .wrap{display:flex;flex-direction:column}
  .top{background:var(--ink-900);color:#fff;text-align:center;font:var(--w-regular) 11px/1 var(--font-sans);letter-spacing:.1em;padding:8px}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 26px;border-bottom:1px solid var(--line-300)}
  .logo{font:var(--w-bold) 20px/1 var(--font-sans);letter-spacing:4px}
  nav{display:flex;gap:26px}
  nav a{font:var(--w-medium) 13px/1 var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:var(--fg);text-decoration:none}
  nav a.act{border-bottom:2px solid var(--ink-900);padding-bottom:4px}
  .icons{display:flex;gap:18px;color:var(--fg)}
  .icons .material-icons-outlined{font-size:22px}
</style></head>
<body><div class="wrap">
  <div class="top">免運門檻 NT$1,500 · 全館會員多重好禮</div>
  <header>
    <div class="logo">EVOMNI</div>
    <nav><a class="act" href="#">SHOP</a><a href="#">保養</a><a href="#">彩妝</a><a href="#">香氛</a><a href="#">JOURNAL</a></nav>
    <div class="icons"><span class="material-icons-outlined">search</span><span class="material-icons-outlined">person_outline</span><span class="material-icons-outlined">shopping_bag</span></div>
  </header>
</div></body></html>
