<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg);color:var(--fg)}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:baseline;gap:16px}
  .tag{font:var(--w-regular) 11px/1 var(--font-mono);color:var(--fg-subtle);white-space:nowrap;margin-left:auto}
</style></head>
<body><div class="card">
  <div class="row"><div class="ds-h3">Section heading 區塊標題</div><span class="tag">h3 · 22 / 600</span></div>
  <div class="row"><div class="ds-h4">Subheading 小標</div><span class="tag">h4 · 18 / 500</span></div>
  <div class="row"><div class="ds-body">Body copy 內文段落，敘述產品成分與使用方式。</div><span class="tag">body · 16 / 400</span></div>
  <div class="row"><div class="ds-sm">Secondary / meta 次要說明文字</div><span class="tag">sm · 14 / 400</span></div>
  <div class="row"><div class="ds-caption">Caption · 圖說與輔助資訊</div><span class="tag">xs · 12 / 400</span></div>
</div></body></html>
