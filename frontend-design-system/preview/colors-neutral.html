<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg);color:var(--fg)}
  .card{padding:22px 26px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{display:flex;flex-direction:column;gap:6px}
  .chip{height:56px;border:1px solid var(--line-300)}
  .nm{font:var(--w-medium) 11px/1.3 var(--font-sans)}
  .hx{font:var(--w-regular) 10px/1 var(--font-mono);color:var(--fg-subtle)}
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#303133"></div><div class="nm">ink-900</div><div class="hx">#303133</div></div>
    <div class="sw"><div class="chip" style="background:#606266"></div><div class="nm">ink-700</div><div class="hx">#606266</div></div>
    <div class="sw"><div class="chip" style="background:#909399"></div><div class="nm">ink-500</div><div class="hx">#909399</div></div>
    <div class="sw"><div class="chip" style="background:#c0c4cc"></div><div class="nm">ink-300</div><div class="hx">#c0c4cc</div></div>
    <div class="sw"><div class="chip" style="background:#dcdfe6"></div><div class="nm">line-400</div><div class="hx">#dcdfe6</div></div>
    <div class="sw"><div class="chip" style="background:#ebeef5"></div><div class="nm">line-200</div><div class="hx">#ebeef5</div></div>
    <div class="sw"><div class="chip" style="background:#f5f7fa"></div><div class="nm">fill-400</div><div class="hx">#f5f7fa</div></div>
    <div class="sw"><div class="chip" style="background:#f9fafb"></div><div class="nm">fill-300</div><div class="hx">#f9fafb</div></div>
    <div class="sw"><div class="chip" style="background:#fafafa"></div><div class="nm">fill-200</div><div class="hx">#fafafa</div></div>
    <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="nm">fill-100</div><div class="hx">#ffffff</div></div>
  </div>
</div></body></html>
