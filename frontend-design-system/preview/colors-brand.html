<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg);color:var(--fg)}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sw{display:flex;flex-direction:column;gap:6px}
  .chip{height:52px;border:1px solid var(--line-300)}
  .nm{font:var(--w-medium) 11px/1.3 var(--font-sans)}
  .hx{font:var(--w-regular) 10px/1 var(--font-mono);color:var(--fg-subtle)}
  .note{font:var(--w-regular) 12px/1.4 var(--font-sans);color:var(--fg-muted)}
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#303133"></div><div class="nm">brand</div><div class="hx">#303133</div></div>
    <div class="sw"><div class="chip" style="background:#1a1b1d"></div><div class="nm">brand-hover</div><div class="hx">#1a1b1d</div></div>
    <div class="sw"><div class="chip" style="background:#000000"></div><div class="nm">brand-active</div><div class="hx">#000000</div></div>
    <div class="sw"><div class="chip" style="background:#f4f4f5"></div><div class="nm">brand-soft</div><div class="hx">#f4f4f5</div></div>
  </div>
  <div class="note">Default brand = charcoal. Override these four tokens to re-skin any storefront — nothing else changes.</div>
</div></body></html>
