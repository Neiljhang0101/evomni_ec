<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg);color:var(--fg)}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:center;gap:14px}
  .bar{height:16px;background:var(--ink-900)}
  .nm{font:var(--w-medium) 11px/1 var(--font-mono);width:70px}
  .px{font:var(--w-regular) 11px/1 var(--font-mono);color:var(--fg-subtle)}
</style></head>
<body><div class="card">
  <div class="row"><span class="nm">s-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="nm">s-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="nm">s-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="nm">s-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="nm">s-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="nm">s-8</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="nm">s-12</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="nm">s-16</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
</div></body></html>
