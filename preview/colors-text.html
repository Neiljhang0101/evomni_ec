<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #fff; padding: 20px; }
  .row { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
  .item { display: flex; flex-direction: column; gap: 4px; }
  .sample { font-size: 18px; font-weight: 700; }
  .name { font-size: 11px; font-weight: 700; color: #303133; }
  .val  { font-size: 11px; color: #909399; font-family: monospace; }
</style>
</head>
<body>
<div class="row">
  <div class="item">
    <div class="sample" style="color:#303133">文字樣本 Aa</div>
    <div class="name">Text Primary</div>
    <div class="val">#303133</div>
  </div>
  <div class="item">
    <div class="sample" style="color:#606266">文字樣本 Aa</div>
    <div class="name">Text Regular</div>
    <div class="val">#606266</div>
  </div>
  <div class="item">
    <div class="sample" style="color:#909399">文字樣本 Aa</div>
    <div class="name">Text Secondary</div>
    <div class="val">#909399</div>
  </div>
  <div class="item">
    <div class="sample" style="color:#C0C4CC">文字樣本 Aa</div>
    <div class="name">Text Disabled</div>
    <div class="val">#C0C4CC</div>
  </div>
  <div class="item">
    <div class="sample" style="color:#409EFF">文字樣本 Aa</div>
    <div class="name">Text Link</div>
    <div class="val">#409EFF</div>
  </div>
  <div class="item">
    <div class="sample" style="color:#F56C6C">文字樣本 Aa</div>
    <div class="name">Text Danger</div>
    <div class="val">#F56C6C</div>
  </div>
</div>
</body>
</html>
