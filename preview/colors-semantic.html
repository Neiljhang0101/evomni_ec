<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #fff; padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 100px; height: 64px; }
  .name { font-size: 11px; font-weight: 700; color: #303133; }
  .val  { font-size: 11px; color: #909399; font-family: monospace; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="chip" style="background:#67C23A"></div>
    <div class="name">Success</div>
    <div class="val">#67C23A</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#E6A23C"></div>
    <div class="name">Warning</div>
    <div class="val">#E6A23C</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#F56C6C"></div>
    <div class="name">Danger</div>
    <div class="val">#F56C6C</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#909399"></div>
    <div class="name">Info / Disabled</div>
    <div class="val">#909399</div>
  </div>
</div>
</body>
</html>
