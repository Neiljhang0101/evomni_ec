<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #F5F7FA; padding: 24px; }
  .page-title-row { display: flex; align-items: center; gap: 16px; }
  h1 { font-size: 20px; font-weight: 700; color: #303133; white-space: nowrap; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .crumb { color: #909399; cursor: pointer; }
  .crumb:hover { color: #606266; }
  .sep { color: #C0C4CC; font-size: 12px; }
  .crumb-current { color: #303133; cursor: default; }
</style>
</head>
<body>
<div class="page-title-row">
  <h1>產品管理</h1>
  <div class="breadcrumb">
    <span class="crumb">產品</span>
    <span class="sep">/</span>
    <span class="crumb-current">產品管理</span>
  </div>
</div>
</body>
</html>
