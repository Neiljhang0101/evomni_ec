<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #F5F7FA; padding: 24px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../ui_kits/admin/LocaleTabs.jsx"></script>
<script type="text/babel">

const inputStyle = {
  width: '100%', height: 40, padding: '0 10px',
  border: '1px solid #DCDFE6', borderRadius: 0,
  fontSize: 14, color: '#303133', outline: 'none',
  fontFamily: 'Noto Sans TC, sans-serif',
};

const CONTENT = {
  '繁中': {
    productName: '',
    searchKeyword: '輸入關鍵字後按 Enter',
  },
  'EN': {
    productName: '',
    searchKeyword: 'Enter keywords and press Enter',
  },
};

function Demo() {
  return (
    <div style={{ maxWidth: 760 }}>
      <LocaleTabs
        locales={['繁中', 'EN']}
        renderContent={(locale) => {
          const c = CONTENT[locale];
          return (
            <div>
              {/* Product Images */}
              <LocaleField label="產品圖片" helper="支援 圖片 格式，最多 99 個，檔案大小不超過 20MB">
                <ImageUpload width={140} height={140} />
              </LocaleField>

              {/* Product Name */}
              <LocaleField label="產品名稱" required>
                <input
                  style={inputStyle}
                  placeholder={c.productName}
                  onFocus={e => e.target.style.borderColor = '#409EFF'}
                  onBlur={e => e.target.style.borderColor = '#DCDFE6'}
                />
              </LocaleField>

              {/* Search Keywords */}
              <LocaleField label="站內搜尋關鍵字">
                <input
                  style={inputStyle}
                  placeholder={c.searchKeyword}
                  onFocus={e => e.target.style.borderColor = '#409EFF'}
                  onBlur={e => e.target.style.borderColor = '#DCDFE6'}
                />
              </LocaleField>

              {/* List Image */}
              <LocaleField label="列表圖片">
                <ImageUpload width={140} height={140} />
              </LocaleField>
            </div>
          );
        }}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
