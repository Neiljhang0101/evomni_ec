<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #fff; padding: 20px; }
  .row { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: #409EFF; width: 20px; }
  .name { font-size: 11px; font-weight: 700; color: #303133; }
  .val  { font-size: 11px; color: #909399; font-family: monospace; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:8px"></div><div class="name">space-1</div><div class="val">8px</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="name">space-2</div><div class="val">16px</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="name">space-3</div><div class="val">24px</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="name">space-4</div><div class="val">32px</div></div>
  <div class="item"><div class="bar" style="height:40px"></div><div class="name">space-5</div><div class="val">40px</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="name">space-6</div><div class="val">48px</div></div>
</div>
</body>
</html>
