<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #fff; padding: 20px; }
  .row { display: flex; gap: 32px; align-items: flex-start; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 80px; height: 48px; background: #303133; }
  .pill { width: 80px; height: 28px; background: #303133; border-radius: 9999px; }
  .name { font-size: 11px; font-weight: 700; color: #303133; text-align: center; }
  .val  { font-size: 10px; color: #909399; font-family: monospace; text-align: center; }
  .note { font-size: 10px; color: #606266; text-align: center; max-width: 90px; }
</style>
</head>
<body>
<div class="row">
  <div class="item">
    <div class="box"></div>
    <div class="name">radius-none</div>
    <div class="val">0px</div>
    <div class="note">Global default — buttons, inputs, cards</div>
  </div>
  <div class="item">
    <div class="pill"></div>
    <div class="name">radius-pill</div>
    <div class="val">9999px</div>
    <div class="note">Tags only — exception to global rule</div>
  </div>
</div>
</body>
</html>
