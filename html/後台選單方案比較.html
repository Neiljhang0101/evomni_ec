// ─── Shared Sidebar Row components ───────────────────────────────────────────

function L2Row({ child, active, onNavigate }) {
  const isActive = active === child.id;
  const [hovered, setHovered] = React.useState(false);
  return (
    <div
      onClick={() => onNavigate(child.id)}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{ display: 'flex', alignItems: 'center', padding: '0 14px 0 40px', height: 40, cursor: 'pointer', background: isActive ? C.accentBg : (hovered ? C.hover : 'transparent'), color: isActive ? C.accent : C.textSub, fontSize: 13, fontWeight: isActive ? 500 : 400, borderLeft: `2px solid ${isActive ? C.accent : 'transparent'}`, userSelect: 'none', transition: 'background 0.15s' }}>
      {child.label}
    </div>
  );
}

function L1Row({ item, active, expanded, onToggle, onNavigate }) {
  const parentActive = active === item.id || (item.children || []).some(c => active === c.id);
  const isOpen = expanded[item.id];
  const [hovered, setHovered] = React.useState(false);
  return (
    <div>
      {item.sectionLabel && (
        <div style={{ padding: '20px 16px 2px', fontSize: 12, color: '#B0B6BF', letterSpacing: '0.06em', fontWeight: 600, userSelect: 'none', textTransform: 'uppercase' }}>
          {item.sectionLabel}
        </div>
      )}
      <div
        onClick={() => item.children ? onToggle(item.id) : onNavigate(item.id)}
        onMouseEnter={() => setHovered(true)}
        onMouseLeave={() => setHovered(false)}
        style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 14px', height: 44, cursor: 'pointer', background: hovered ? C.hover : (parentActive && !item.children ? C.accentBg : 'transparent'), color: parentActive ? C.textMain : C.textSub, fontSize: 13.5, fontWeight: parentActive ? 500 : 400, userSelect: 'none', transition: 'background 0.15s' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ color: parentActive ? C.accent : C.textSub, display: 'flex' }}>{item.icon}</span>
          <span>{item.label}</span>
        </div>
        {item.children && Icon.chevron(isOpen)}
      </div>
      {item.children && (
        <div style={{ overflow: 'hidden', maxHeight: isOpen ? item.children.length * 40 + 16 + 'px' : '0', transition: 'max-height 0.2s cubic-bezier(.4,0,.2,1)' }}>
          {item.children.map(child => (
            <L2Row key={child.id} child={child} active={active} onNavigate={onNavigate} />
          ))}
        </div>
      )}
    </div>
  );
}

function SidebarB({ context, onContextChange, active, onNavigate }) {
  const [showSharedDetail, setShowSharedDetail] = React.useState(false);
  const menuData = context === 'ec' ? PLAN_B_EC_MENU : PLAN_B_CMS_MENU;
  const [expanded, setExpanded] = React.useState(() => {
    const m = {};
    PLAN_B_EC_MENU.forEach(i => { if (i.children) m[i.id] = true; });
    return m;
  });

  const switchContext = (ctx) => {
    onContextChange(ctx);
    const menu = ctx === 'ec' ? PLAN_B_EC_MENU : PLAN_B_CMS_MENU;
    const m = {};
    menu.forEach(i => { if (i.children) m[i.id] = true; });
    setExpanded(m);
    setShowSharedDetail(false);
    const allIds = new Set([
      ...menu.map(i => i.id),
      ...menu.flatMap(i => (i.children || []).map(c => c.id)),
    ]);
    if (!allIds.has(active)) onNavigate('dashboard');
  };

  'website-ec':      { title: '電商網站',     ecLabel: '電商前台網站設定與佈景',           shared: false },
};

function resolvePageMeta(activeId, menuData) {
  if (PAGE_META[activeId]) return PAGE_META[activeId];
  for (const item of menuData) {
    if (item.children) {
      const child = item.children.find(c => c.id === activeId);
      if (child) {
        const p = PAGE_META[item.id];
        if (p) return { ...p, title: child.label };
      }
    }
  }
  return { title: activeId, ecLabel: '', shared: false };
}

// Resolves section label + parent item + child item for any activeId
function resolveMenuContext(activeId, menuData) {
  let currentSection = null;
  for (const item of menuData) {
    if (item.sectionLabel) currentSection = item.sectionLabel;
    if (item.id === activeId) return { section: currentSection, item, child: null };
    if (item.children) {
      const child = item.children.find(c => c.id === activeId);
      if (child) return { section: currentSection, item, child };
    }
  }
  return { section: null, item: null, child: null };
}

function R_SidebarTablet({ active, onNav }) {
  const [flyout, setFlyout] = React.useState(null);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const close = () => setFlyout(null);
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, []);
  const handleIcon = (item, e) => {
    e.stopPropagation();
    if (!item.children) { onNav(item.id); setFlyout(null); return; }
    if (flyout && flyout.id === item.id) { setFlyout(null); return; }
    const ir = e.currentTarget.getBoundingClientRect();
    const cr = ref.current.getBoundingClientRect();
    setFlyout({ id: item.id, top: ir.top - cr.top });
  };
  return (
    <div ref={ref} style={{ width: 56, minWidth: 56, height: '100%', background: '#fff', borderRight: `1px solid ${C.border}`, display: 'flex', flexDirection: 'column', position: 'relative' }}>

          if (item.sectionLabel) return (
            <div key={idx} style={{ width: 28, height: 1, background: C.border, margin: '6px 0' }} />
          );
          const on = active === item.id || (item.children || []).some(c => c.id === active);
          const flyOpen = flyout && flyout.id === item.id;
          return (
            <div key={item.id} onClick={e => handleIcon(item, e)} title={item.label}
              style={{ width: 40, height: 40, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', background: on ? C.accentBg : flyOpen ? C.hover : 'transparent', borderRadius: 4, borderLeft: on ? `2px solid ${C.accent}` : '2px solid transparent', transition: 'background .1s' }}
              onMouseEnter={e => { if (!on) e.currentTarget.style.background = C.hover; }}
              onMouseLeave={e => { e.currentTarget.style.background = on ? C.accentBg : flyOpen ? C.hover : 'transparent'; }}>
              <span style={{ color: on ? C.accent : C.textSub, display: 'flex', alignItems: 'center' }}>{item.icon}</span>
            </div>
          );
        })}

            <div style={{ padding: '8px 14px 6px', fontSize: 12, color: C.textSub, borderBottom: `1px solid ${C.border}`, fontWeight: 500 }}>{item.label}</div>
            {item.children.map(child => {

              return (

function mkCtxHandler(setContext, active, setActive) {
  return (ctx) => {
    setContext(ctx);
    const menu = ctx === 'ec' ? RB_EC_MENU : RB_CMS_MENU;
    const ids = new Set([...menu.filter(i=>i.id).map(i=>i.id), ...menu.filter(i=>i.children).flatMap(i=>i.children.map(c=>c.id))]);
    if (!ids.has(active)) setActive('dashboard');
  };
}

            <div style={{ fontSize: 13, color: '#606266', lineHeight: 1.65 }}>
              研究涵蓋 Shopify、Squarespace、Wix、BigCommerce、Duda、SHOPLINE、91APP、WACA、EasyStore、Webflow 共 10 個功能組合與 Evomni 最相近的平台（同時具備電商後台與品牌形象站管理）。
              10 個平台中 9 個採用方案 A 統一側邊選單，唯一採用情境切換的 Webflow，其設計目的是服務設計師、文字編輯、資料管理員等不同職能角色，而非在電商與網站管理功能域之間切換，情境本質與 Evomni 不同。
              值得注意的是，各平台在面對選單項目過多的問題時，解法一致是漸進揭露（Shopify 的「View more」）或明確分組（Squarespace 的 Pages / Commerce 分組），沒有任何一個平台選擇引入情境切換作為解法。
            </div>
          </div>

          <div style={{ padding: '12px 16px', background: '#F0F9EB', borderRadius: 6, border: '1px solid #C2E7B0' }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: '#67C23A', marginBottom: 6 }}>針對 Evomni 現階段的工程建議</div>
            <div style={{ fontSize: 13, color: '#606266', lineHeight: 1.65, marginBottom: 10 }}>
              以 Evomni 目前以中小型商家為主要目標客群、工程資源有限的現況，方案 A 在現階段的風險更低，且九項情境中整體表現更穩定。
              若未來 Evomni 服務的商家規模成長、員工分工更明確，或電商與形象站功能各自大幅增加，方案 B 的架構前提將更加成立，屆時的遷移成本也會隨功能量增加而提高。
            </div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.textMain, marginBottom: 6 }}>方案 A 現階段可做的改善（無需重構）</div>
            {[
              { title: '帳號角色預設情境（方案 B 若啟用）', desc: '若採行方案 B，帳號建立時應依角色設定預設情境，避免倉管或形象站編輯每次登入都需手動切換。' },
              { title: '角色權限控制選單可見項目（中期）', desc: '帳號權限系統上線後，依角色隱藏不相關的選單項目，等效達成方案 B 的選單聚焦效果，不引入情境切換架構。' },
            ].map((item, i) => (
              <div key={i} style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'flex-start' }}>
                <div style={{ width: 18, height: 18, borderRadius: '50%', background: C.successBg, color: C.success, fontSize: 12, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>{i + 1}</div>
                <div style={{ fontSize: 13, color: '#606266', lineHeight: 1.55 }}><strong>{item.title}</strong> — {item.desc}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Footer */}
        <div style={{ textAlign: 'center', fontSize: 12, color: '#C0C4CC', paddingBottom: 16 }}>
          Evomni 新電商系統 | 介面設計與應用工程整合設計文件 | 本文件為內部溝通用途
        </div>
      </div>
      )}

      {tab === 'rwd' && <RwdPanel />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
