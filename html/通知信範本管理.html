<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>通知信範本管理 — Evomni Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Noto Sans TC', sans-serif; font-size: 14px; color: #303133; background: #F5F7FA; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #DCDFE6; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    input[type="radio"], input[type="checkbox"] { accent-color: #409EFF; }
    input::placeholder, textarea::placeholder { color: #909399; }
    @keyframes evo-drawer-in { from { transform: translateX(100%); } to { transform: translateX(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../components/Sidebar.jsx"></script>
  <script type="text/babel" src="../components/Header.jsx"></script>
  <script type="text/babel" src="../components/SharedUI.jsx"></script>
  <script type="text/babel" src="../components/Dialog.jsx"></script>
  <script type="text/babel" src="../components/pages/PageNotificationTemplates.jsx"></script>

  <script type="text/babel">
    function App() {
      const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
      return (
        <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
          <Sidebar currentPage="gs-notification-templates" onNavigate={() => {}} collapsed={sidebarCollapsed} />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
            <Header onToggleSidebar={() => setSidebarCollapsed((c) => !c)} />
            <main style={{ flex: 1, overflow: 'auto', padding: '32px 40px', background: '#F5F7FA' }}>
              <NotificationTemplatesPage />
            </main>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
