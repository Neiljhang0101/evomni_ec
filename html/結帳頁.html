<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結帳 — Evomni Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<link rel="stylesheet" href="../frontend-design-system/colors_and_type.css">
<link rel="stylesheet" href="../frontend-design-system/rwd.css">
<link rel="stylesheet" href="../evomnialert/evomnialert.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../evomnialert/evomnialert.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { min-height: 100%; }
  body { font-family: var(--font-sans); font-size: 16px; background: var(--fill-300); color: var(--fg); -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--line-300); }
  button { cursor: pointer; font-family: var(--font-sans); }
  input, select, textarea { font-family: var(--font-sans); font-size: 14px; color: var(--fg); outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--ink-900) !important; }
  a { color: var(--fg); text-decoration: none; }
  .proto-bar { background: var(--ink-900); display: flex; align-items: center; padding: 0 24px; overflow-x: auto; }
  .proto-bar-label { font-size: 14px; letter-spacing: .08em; color: rgba(255,255,255,.45); text-transform: uppercase; padding-right: 12px; white-space: nowrap; }
  .proto-btn { padding: 9px 14px; border: none; background: none; border-bottom: 2px solid transparent; font: 500 14px/1 var(--font-sans); letter-spacing: .04em; color: rgba(255,255,255,.55); cursor: pointer; white-space: nowrap; }
  .proto-btn.active { border-bottom-color: #fff; color: #fff; }
  .mobile-cta { display: none; }
  .sidebar-col { display: block; }
  .checkout-layout { display: flex; gap: 32px; align-items: flex-start; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 899px) {
    .mobile-cta { display: block; position: sticky; bottom: 0; z-index: 50; background: var(--bg); border-top: 1px solid var(--line-300); padding: 12px 16px; }
    .sidebar-col { display: none; }
    .checkout-layout { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../frontend-design-system/ui_kits/storefront/ui.jsx"></script>
<script type="text/babel" src="../frontend-design-system/ui_kits/storefront/sections.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── Taiwan Address Data ──────────────────────────────────────────────────────
const COUNTIES = ['台北市','新北市','桃園市','台中市','台南市','高雄市'];
const DISTRICTS = {
  '台北市': ['中正區','大安區','信義區','松山區','內湖區','士林區','北投區','文山區','南港區','中山區'],
  '新北市': ['板橋區','三重區','中和區','永和區','新莊區','新店區','土城區','蘆洲區','汐止區'],
  '桃園市': ['桃園區','中壢區','平鎮區','八德區','楊梅區','蘆竹區','龍潭區'],
  '台中市': ['中區','東區','南區','西區','北區','西屯區','南屯區','北屯區','大里區'],
  '台南市': ['中西區','東區','南區','北區','安平區','安南區','永康區','仁德區'],
  '高雄市': ['新興區','前金區','苓雅區','鹽埕區','鼓山區','前鎮區','三民區','楠梓區'],
};

const CART_ITEMS = [
  { id: 1, name: '輕透水潤精華乳', category: 'SKINCARE', specs: ['容量：50ml', '款式：一般型'], price: 890, qty: 2, img: '../assets/img2.png' },
  { id: 2, name: '深層修護面膜', category: 'TREATMENT', specs: ['包裝：5 片裝', '款式：保濕型'], price: 650, qty: 1, img: '../assets/img3.png' },
];
const SUBTOTAL = CART_ITEMS.reduce((s, i) => s + i.price * i.qty, 0); // 2430

const DELIVERY_OPTIONS = [
  { id: 'home', label: '宅配到府', fee: 0, note: '（滿 NT$1,500 免運，已達門檻）' },
  { id: '711', label: '7-ELEVEN 超商取貨', fee: 65 },
  { id: 'family', label: '全家超商取貨', fee: 65 },
];

const PAYMENT_OPTIONS = [
  { id: 'credit', label: '信用卡（一次付清）' },
  { id: 'line_pay', label: 'LINE Pay' },
  { id: 'atm', label: 'ATM 虛擬帳號', note: '7 天內完成轉帳' },
  { id: 'cvs', label: '超商代碼繳費', note: '72 小時內繳款' },
  { id: 'cod', label: '貨到付款' },
];

const MEMBER_ADDRESSES = [
  { id: 1, name: '王小明', phone: '0912-345-678', county: '台北市', district: '大安區', address: '敦化南路一段 100 號 5 樓', isDefault: true },
  { id: 2, name: '王小明', phone: '0912-345-678', county: '台北市', district: '信義區', address: '松仁路 100 號', isDefault: false },
];

const COUPON_ERRORS = {
  invalid: '優惠代碼無效，請確認後重新輸入',
  min_order: '此優惠需消費滿 NT$500 才可使用（目前購物車金額不符）',
  expired: '此優惠代碼已過期，請改用其他優惠',
  used: '此優惠代碼已使用過',
  no_match: '購物車中無符合此優惠的商品',
};

// ─── UI Primitives ────────────────────────────────────────────────────────────
const StateBar = ({ states, current, onChange }) => (
  <div className="proto-bar">
    <span className="proto-bar-label">Prototype State</span>
    {states.map(s => (
      <button key={s.key} className={`proto-btn${current === s.key ? ' active' : ''}`} onClick={() => onChange(s.key)}>
        {s.label}
      </button>
    ))}
    <a href="訪客訂單查詢.html" style={{ fontSize: 12, color: 'rgba(255,255,255,.45)', textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 5, padding: '9px 0 9px 16px', letterSpacing: '.04em', whiteSpace: 'nowrap', borderLeft: '1px solid rgba(255,255,255,.12)', marginLeft: 8 }}>
      訪客訂單查詢
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M1 10L10 1M10 1H4M10 1V7"/></svg>
    </a>
  </div>
);

const SectionCard = ({ eyebrow, title, children, noPad }) => (
  <div style={{ background: 'var(--bg)', border: '1px solid var(--line-300)', marginBottom: 16 }}>
    <div style={{ padding: '16px 24px', borderBottom: '1px solid var(--line-200)', display: 'flex', flexDirection: 'column', gap: 6 }}>
      <Eyebrow>{eyebrow}</Eyebrow>
      <div style={{ font: '600 16px/1 var(--font-sans)', color: 'var(--fg)' }}>{title}</div>
    </div>
    <div style={noPad ? undefined : { padding: 24 }}>{children}</div>
  </div>
);

const FormField = ({ label, required, children, hint, error }) => (
  <div style={{ marginBottom: 18 }}>
    <label style={{ display: 'block', font: '500 14px/1 var(--font-sans)', letterSpacing: '.04em', color: 'var(--fg-muted)', marginBottom: 8, textTransform: 'uppercase' }}>
      {required && <span style={{ color: 'var(--danger)', marginRight: 3 }}>*</span>}{label}
    </label>
    {children}
    {hint && <div style={{ font: '400 14px/1.4 var(--font-sans)', color: 'var(--fg-subtle)', marginTop: 5 }}>{hint}</div>}
    {error && <div style={{ font: '400 14px/1 var(--font-sans)', color: 'var(--danger)', marginTop: 5 }}>{error}</div>}
  </div>
);

const TextInput = ({ value, onChange, placeholder, disabled, maxLength, type = 'text' }) => (
  <input
    type={type} value={value} onChange={e => onChange && onChange(e.target.value)}
    placeholder={placeholder} disabled={disabled} maxLength={maxLength}
    style={{
      width: '100%', height: 40, padding: '0 14px',
      border: '1px solid var(--line-400)',
      background: disabled ? 'var(--surface-sunken)' : 'var(--bg)',
      color: disabled ? 'var(--fg-disabled)' : 'var(--fg)',
      font: '400 14px/1 var(--font-sans)', transition: 'border-color .15s',
    }}
  />
);

const SelectBox = ({ value, onChange, options, placeholder, disabled }) => (
  <select
    value={value} onChange={e => onChange && onChange(e.target.value)} disabled={disabled}
    style={{
      width: '100%', height: 40, padding: '0 14px',
      border: '1px solid var(--line-400)',
      background: disabled ? 'var(--surface-sunken)' : 'var(--bg)',
      color: value ? 'var(--fg)' : 'var(--fg-subtle)',
      font: '400 14px/1 var(--font-sans)', appearance: 'auto',
    }}
  >
    {placeholder && <option value="">{placeholder}</option>}
    {options.map(o => <option key={o} value={o}>{o}</option>)}
  </select>
);

const RadioCard = ({ selected, onClick, children }) => (
  <div onClick={onClick} style={{
    padding: '14px 16px', border: `1px solid ${selected ? 'var(--ink-900)' : 'var(--line-300)'}`,
    background: selected ? 'var(--brand-soft)' : 'var(--bg)',
    cursor: 'pointer', marginBottom: 8, display: 'flex', alignItems: 'flex-start', gap: 12,
    transition: 'border-color .15s, background .15s',
  }}>
    <div style={{
      width: 18, height: 18, border: `2px solid ${selected ? 'var(--ink-900)' : 'var(--line-400)'}`,
      borderRadius: '50%', marginTop: 1, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      {selected && <div style={{ width: 8, height: 8, background: 'var(--ink-900)', borderRadius: '50%' }} />}
    </div>
    <div style={{ flex: 1 }}>{children}</div>
  </div>
);

const Spinner = () => (
  <span style={{ width: 16, height: 16, border: '2px solid rgba(255,255,255,.3)', borderTopColor: '#fff', borderRadius: '50%', display: 'inline-block', animation: 'spin .7s linear infinite', marginRight: 8 }} />
);

// ─── Checkout Header ──────────────────────────────────────────────────────────
const CheckoutHeader = () => (
  <header className="checkout-header" style={{ background: 'var(--bg)', borderBottom: '1px solid var(--line-300)', padding: '18px 40px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 20 }}>
    <img src="../frontend-design-system/uploads/logo.jpg" alt="Evomni" style={{ height: 36, width: 'auto', display: 'block' }} />
    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
      <Icon name="lock_outline" size={14} style={{ color: 'var(--fg-subtle)' }} />
      <span style={{ font: '500 14px/1 var(--font-sans)', letterSpacing: '.12em', color: 'var(--fg-subtle)', textTransform: 'uppercase' }}>
        Secure Checkout
      </span>
    </div>
  </header>
);

// ─── Breadcrumb / Steps ───────────────────────────────────────────────────────
const StepsBreadcrumb = () => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 36 }}>
    {[['購物車', false, '購物車.html'], ['填寫資料', true, null], ['完成訂購', false, null]].map(([label, active, href], i) => (
      <React.Fragment key={label}>
        {i > 0 && <span style={{ font: '400 14px/1 var(--font-sans)', color: 'var(--fg-subtle)' }}>›</span>}
        {href ? (
            <a href={href} style={{ font: '400 14px/1 var(--font-sans)', color: 'var(--fg-subtle)' }}>{label}</a>
          ) : (
            <span style={{ font: `${active ? '600' : '400'} 14px/1 var(--font-sans)`, color: active ? 'var(--fg)' : 'var(--fg-subtle)' }}>{label}</span>
          )}
      </React.Fragment>
    ))}
  </div>
);

// ─── Delivery Labels ──────────────────────────────────────────────────────────
const DELIVERY_LABELS = { home: '宅配到府', '711': '7-ELEVEN 超商取貨', family: '全家超商取貨', frozen: '冷凍宅配' };
const isCVS = (m) => m === '711' || m === 'family';

// ─── Section 1: Shipping Info ─────────────────────────────────────────────────
const ShippingSection = ({ isGuest, form, setForm, deliveryMethod }) => {
  const [selectedAddr, setSelectedAddr] = useState(1);
  const [showNewForm, setShowNewForm] = useState(false);

  const fillAddress = (addr) => {
    setForm(f => ({ ...f, name: addr.name, phone: addr.phone, county: addr.county, district: addr.district, address: addr.address }));
    setSelectedAddr(addr.id);
    setShowNewForm(false);
  };

  return (
    <SectionCard eyebrow="STEP 01" title="收件資訊">
      {/* Confirmed delivery method */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', background: 'var(--fill-300)', border: '1px solid var(--line-300)', marginBottom: 20 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <Icon name="local_shipping" size={16} style={{ color: 'var(--fg-subtle)', flexShrink: 0, width: 16, height: 16, overflow: 'hidden' }} />
          <span style={{ font: '500 14px/1 var(--font-sans)', color: 'var(--fg)' }}>{DELIVERY_LABELS[deliveryMethod] || '宅配到府'}</span>
        </div>
        <a href="購物車.html" style={{ font: '400 13px/1 var(--font-sans)', color: 'var(--fg-subtle)', textDecoration: 'underline', textUnderlineOffset: 3 }}>修改</a>
      </div>
      {isGuest ? (
        <div style={{ padding: '12px 16px', background: 'var(--fill-300)', border: '1px solid var(--line-300)', marginBottom: 20, display: 'flex', gap: 10, alignItems: 'flex-start' }}>
          <Icon name="info_outline" size={16} style={{ color: 'var(--fg-subtle)', marginTop: 1, flexShrink: 0 }} />
          <div style={{ font: '400 14px/1.5 var(--font-sans)', color: 'var(--fg-muted)' }}>
            已有帳號？{' '}
            <a href="前台會員登入.html" style={{ color: 'var(--fg)', textDecoration: 'underline', textUnderlineOffset: 3 }}>登入</a>
            {' '}以享有點數回饋及地址快速填入
          </div>
        </div>
      ) : (
        <div style={{ marginBottom: 20 }}>
          <div style={{ font: '500 14px/1 var(--font-sans)', letterSpacing: '.12em', color: 'var(--fg-subtle)', textTransform: 'uppercase', marginBottom: 10 }}>選擇收件地址</div>
          {MEMBER_ADDRESSES.map(addr => (
            <RadioCard key={addr.id} selected={selectedAddr === addr.id && !showNewForm} onClick={() => fillAddress(addr)}>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 3 }}>
                <span style={{ font: '500 14px/1 var(--font-sans)', color: 'var(--fg)' }}>{addr.name}</span>
                <span style={{ font: '400 14px/1 var(--font-sans)', color: 'var(--fg-subtle)' }}>{addr.phone}</span>
                {addr.isDefault && <Badge tone="ink">預設</Badge>}
              </div>
              <div style={{ font: '400 14px/1.4 var(--font-sans)', color: 'var(--fg-muted)' }}>{addr.county}{addr.district} {addr.address}</div>
            </RadioCard>
          ))}
          <div onClick={() => { setShowNewForm(true); setSelectedAddr(null); }} style={{
            padding: '12px 16px', border: `1px dashed ${showNewForm ? 'var(--ink-900)' : 'var(--line-400)'}`,
            background: showNewForm ? 'var(--brand-soft)' : 'transparent',
            cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6,
            font: '400 14px/1 var(--font-sans)', color: showNewForm ? 'var(--fg)' : 'var(--fg-subtle)',
            marginBottom: 20,
          }}>
            <Icon name="add" size={16} /> 使用新地址
          </div>
        </div>
      )}

      {(isGuest || showNewForm) && (
        <div>
          <div className="form-grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0 16px' }}>
            <FormField label="收件人姓名" required>
              <TextInput value={form.name} onChange={v => setForm(f => ({ ...f, name: v }))} placeholder="請輸入姓名" maxLength={20} />
            </FormField>
            <FormField label="手機號碼" required hint="格式：09XXXXXXXX">
              <TextInput value={form.phone} onChange={v => setForm(f => ({ ...f, phone: v }))} placeholder="09XXXXXXXX" />
            </FormField>
          </div>
          <FormField label="電子信箱（Email）" required hint="訂單確認信及物流通知將寄至此信箱">
            <TextInput type="email" value={form.email} onChange={v => setForm(f => ({ ...f, email: v }))} placeholder="your@email.com" />
          </FormField>
          {isCVS(deliveryMethod) ? (
            <FormField label="取貨門市" required hint="選擇後將由系統帶入門市地址">
              <button style={{ width: '100%', height: 40, padding: '0 14px', border: '1px solid var(--line-400)', background: 'var(--bg)', font: '400 14px/1 var(--font-sans)', color: form.store ? 'var(--fg)' : 'var(--fg-subtle)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer' }}
                onClick={() => setForm(f => ({ ...f, store: f.store ? '' : `${DELIVERY_LABELS[deliveryMethod]} 大安敦南門市` }))}>
                <span>{form.store || '點擊選擇門市'}</span>
                <Icon name="chevron_right" size={18} style={{ color: 'var(--fg-subtle)', flexShrink: 0, width: 18, height: 18, overflow: 'hidden' }} />
              </button>
            </FormField>
          ) : (
            <div>
              <div className="form-grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0 16px' }}>
                <FormField label="縣市" required>
                  <SelectBox value={form.county} onChange={v => setForm(f => ({ ...f, county: v, district: '' }))} options={COUNTIES} placeholder="請選擇縣市" />
                </FormField>
                <FormField label="鄉鎮市區" required>
                  <SelectBox
                    value={form.district}
                    onChange={v => setForm(f => ({ ...f, district: v }))}
                    options={form.county ? (DISTRICTS[form.county] || []) : []}
                    placeholder={form.county ? '請選擇鄉鎮市區' : '請先選擇縣市'}
                    disabled={!form.county}
                  />
                </FormField>
              </div>
              <FormField label="詳細地址" required>
                <TextInput value={form.address} onChange={v => setForm(f => ({ ...f, address: v }))} placeholder="街道、門牌、樓層" maxLength={80} />
              </FormField>
            </div>
          )}
          <FormField label="備註（選填）" hint="最多 200 字">
            <textarea
              value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))}
              placeholder="配送備註、特殊需求" maxLength={200} rows={3}
              style={{ width: '100%', padding: '10px 14px', border: '1px solid var(--line-400)', resize: 'vertical', background: 'var(--bg)', lineHeight: 1.5, color: 'var(--fg)', font: '400 14px/1.5 var(--font-sans)', transition: 'border-color .15s' }}
            />
          </FormField>
          {!isGuest && (
            <label style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', marginTop: -4 }}>
              <input type="checkbox" checked={form.saveAddr} onChange={e => setForm(f => ({ ...f, saveAddr: e.target.checked }))} style={{ width: 16, height: 16, accentColor: 'var(--ink-900)' }} />
              <span style={{ font: '400 14px/1 var(--font-sans)', color: 'var(--fg-muted)' }}>儲存為常用地址</span>
            </label>
          )}
        </div>
      )}
    </SectionCard>
  );
};

// ─── Section 3: Invoice ───────────────────────────────────────────────────────
const InvoiceSection = ({ invoiceType, setInvoiceType, invoiceData, setInvoiceData }) => {
  const types = [
    { id: 'carrier', label: '個人（雲端載具）' },
    { id: 'natural', label: '個人（自然人憑證）' },
    { id: 'company', label: '公司用途' },
    { id: 'donate', label: '捐贈發票' },
  ];
  return (
    <SectionCard eyebrow="" title="發票設定">
      {types.map(t => (
        <div key={t.id}>
          <RadioCard selected={invoiceType === t.id} onClick={() => setInvoiceType(t.id)}>
            <span style={{ font: '400 14px/1 var(--font-sans)', color: 'var(--fg)' }}>{t.label}</span>
          </RadioCard>
          {invoiceType === t.id && (
            <div style={{ padding: '16px', background: 'var(--fill-300)', border: '1px solid var(--line-200)', borderTop: 'none', marginBottom: 8 }}>
              {t.id === 'carrier' && (
                <FormField label="載具條碼" hint="格式：/XXXXXXX（斜線後 7 碼英數字）">
                  <TextInput value={invoiceData.carrier || ''} onChange={v => setInvoiceData(d => ({ ...d, carrier: v }))} placeholder="/ABC1234" />
                </FormField>
              )}
              {t.id === 'natural' && (
                <FormField label="自然人憑證條碼" hint="格式：P-XXXXXXXXXXXXXXXX">
                  <TextInput value={invoiceData.natural || ''} onChange={v => setInvoiceData(d => ({ ...d, natural: v }))} placeholder="P-XXXXXXXXXXXXXXXX" />
                </FormField>
              )}
              {t.id === 'company' && (
                <div className="form-grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0 16px' }}>
                  <FormField label="統一編號" hint="8 位數字">
                    <TextInput value={invoiceData.taxId || ''} onChange={v => setInvoiceData(d => ({ ...d, taxId: v }))} placeholder="12345678" maxLength={8} />
                  </FormField>
                  <FormField label="發票抬頭" hint="最多 30 字">
                    <TextInput value={invoiceData.companyName || ''} onChange={v => setInvoiceData(d => ({ ...d, companyName: v }))} placeholder="公司名稱" maxLength={30} />
                  </FormField>
                </div>
              )}
              {t.id === 'donate' && (
                <FormField label="愛心碼" hint="3 至 7 位數字">
                  <TextInput value={invoiceData.loveCode || ''} onChange={v => setInvoiceData(d => ({ ...d, loveCode: v }))} placeholder="例：168" maxLength={7} />
                </FormField>
              )}
            </div>
          )}
        </div>
      ))}
    </SectionCard>
  );
};

// ─── Section 6: Payment ───────────────────────────────────────────────────────
const PaymentSection = ({ selected, onChange }) => (
  <SectionCard eyebrow="STEP 02" title="付款方式">
    {PAYMENT_OPTIONS.map(opt => (
      <RadioCard key={opt.id} selected={selected === opt.id} onClick={() => onChange(opt.id)}>
        <span style={{ font: '500 14px/1 var(--font-sans)', color: 'var(--fg)' }}>{opt.label}</span>
        {opt.note && <span style={{ font: '400 14px/1 var(--font-sans)', color: 'var(--fg-subtle)', marginLeft: 8 }}>（{opt.note}）</span>}
        {(opt.id === 'atm' || opt.id === 'cvs') && selected === opt.id && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8, padding: '8px 12px', background: 'var(--warning-soft)', border: '1px solid #faecd8' }}>
            <Icon name="schedule" size={14} style={{ color: 'var(--warning)' }} />
            <span style={{ font: '400 14px/1.4 var(--font-sans)', color: 'var(--warning)' }}>
              請於 {opt.id === 'atm' ? '7 天' : '72 小時'} 內完成付款，逾期訂單將自動取消
            </span>
          </div>
        )}
      </RadioCard>
    ))}
  </SectionCard>
);

// ─── Order Sidebar ────────────────────────────────────────────────────────────
const OrderSidebar = ({ deliveryFee, couponDiscount, pointsDiscount, submitting, onSubmit }) => {
  const total = Math.max(0, SUBTOTAL - couponDiscount - pointsDiscount + deliveryFee);
  const Row = ({ label, value, bold, color }) => (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '5px 0' }}>
      <span style={{ font: `${bold ? '500' : '400'} 16px/1 var(--font-sans)`, color: bold ? 'var(--fg)' : 'var(--fg-muted)' }}>{label}</span>
      <span style={{ font: `${bold ? '600' : '400'} 16px/1 var(--font-sans)`, color: color || (bold ? 'var(--fg)' : 'var(--fg-muted)'), fontVariantNumeric: 'tabular-nums' }}>{value}</span>
    </div>
  );
  return (
    <div style={{ border: '1px solid var(--line-300)', background: 'var(--bg)', position: 'sticky', top: 80 }}>
      <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--line-200)' }}>
        <Eyebrow>訂單摘要</Eyebrow>
      </div>
      <div style={{ padding: '12px 20px', borderBottom: '1px solid var(--line-200)' }}>
        {CART_ITEMS.map(item => (
          <div key={item.id} style={{ display: 'flex', gap: 12, padding: '8px 0', borderBottom: '1px solid var(--line-100)', alignItems: 'center' }}>
            {item.img
              ? <img src={item.img} alt={item.name} style={{ width: 44, height: 44, objectFit: 'cover', flexShrink: 0 }} />
              : <Photo tint="#f0ede8" ratio="1/1" style={{ width: 44, height: 44 }} />
            }
            <div style={{ flex: 1 }}>
              <div style={{ font: '500 16px/1.3 var(--font-sans)', color: 'var(--fg)' }}>{item.name}</div>
              <div style={{ font: '400 14px/1 var(--font-sans)', color: 'var(--fg-subtle)', marginTop: 3 }}>× {item.qty}</div>
            </div>
            <span style={{ font: '500 14px/1 var(--font-sans)', color: 'var(--fg)', whiteSpace: 'nowrap', fontVariantNumeric: 'tabular-nums' }}>NT$ {(item.price * item.qty).toLocaleString()}</span>
          </div>
        ))}
        <div style={{ textAlign: 'right', paddingTop: 8 }}>
          <a href="購物車.html" style={{ font: '400 14px/1 var(--font-sans)', color: 'var(--fg-muted)', textDecoration: 'underline', textUnderlineOffset: 3 }}>
            修改購物車
          </a>
        </div>
      </div>
      <div style={{ padding: '12px 20px', borderBottom: '1px solid var(--line-200)' }}>
        <Row label="商品小計" value={`NT$ ${SUBTOTAL.toLocaleString()}`} />
        {couponDiscount > 0 && <Row label="優惠代碼折扣" value={`- NT$ ${couponDiscount.toLocaleString()}`} color="var(--success)" />}
        {pointsDiscount > 0 && <Row label="點數折抵" value={`- NT$ ${pointsDiscount.toLocaleString()}`} color="var(--success)" />}
        <Row label="運費" value={deliveryFee === 0 ? '免運費' : `NT$ ${deliveryFee}`} color={deliveryFee === 0 ? 'var(--success)' : undefined} />
      </div>
      <div style={{ padding: '12px 20px 20px' }}>
        <Row label="結帳金額" value={`NT$ ${total.toLocaleString()}`} bold />
        <div style={{ marginTop: 16 }}>
          <button onClick={onSubmit} disabled={submitting} style={{
            width: '100%', height: 48, border: 'none',
            background: submitting ? 'var(--ink-300)' : 'var(--brand)',
            color: '#fff', font: '500 16px/1 var(--font-sans)', letterSpacing: '.04em',
            cursor: submitting ? 'not-allowed' : 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            transition: 'background .2s var(--ease)',
          }}>
            {submitting && <Spinner />}
            {submitting ? '處理中…' : '確認送出'}
          </button>
        </div>
        <p style={{ font: '400 14px/1.5 var(--font-sans)', color: 'var(--fg-subtle)', textAlign: 'center', marginTop: 10 }}>
          送出即表示同意本站服務條款與隱私政策
        </p>
      </div>
    </div>
  );
};

// ─── App ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [pageState, setPageState] = useState('member');
  const [form, setForm] = useState({ name: '王小明', phone: '0912-345-678', email: 'member@example.com', county: '台北市', district: '大安區', address: '敦化南路一段 100 號 5 樓', notes: '', saveAddr: false });
  const [deliveryMethod] = useState(() => { try { return localStorage.getItem('deliveryMethod') || 'home'; } catch(e) { return 'home'; } });
  const [invoiceType, setInvoiceType] = useState('carrier');
  const [invoiceData, setInvoiceData] = useState({});
  const [payment, setPayment] = useState('credit');
  const [submitting, setSubmitting] = useState(false);

  const isGuest = pageState === 'guest';

  const STATES = [
    { key: 'member', label: '已登入會員' },
    { key: 'guest', label: '訪客結帳' },
    { key: 'submitting', label: '確認送出中' },
  ];

  useEffect(() => {
    if (pageState === 'submitting') {
      setSubmitting(true);
    } else {
      setSubmitting(false);
    }
    if (pageState === 'guest') {
      setForm(f => ({ ...f, name: '', phone: '', email: '', county: '', district: '', address: '' }));
    } else {
      setForm(f => ({ ...f, name: '王小明', phone: '0912-345-678', email: 'member@example.com', county: '台北市', district: '大安區', address: '敦化南路一段 100 號 5 樓' }));
    }
  }, [pageState]);

  const handleSubmit = () => {
    setSubmitting(true);
    setTimeout(() => { window.location.href = '訂單確認頁.html'; }, 1800);
  };

  const deliveryFee = DELIVERY_OPTIONS.find(o => o.id === deliveryMethod)?.fee ?? 80;
  const couponDiscount = 0;
  const pointsDiscount = 0;

  return (
    <div style={{ minHeight: '100vh', background: 'var(--fill-300)' }}>
      <CheckoutHeader />
      <StateBar states={STATES} current={pageState} onChange={setPageState} />
      <div className="page-main" style={{ maxWidth: 'var(--container)', margin: '0 auto', padding: '40px var(--gutter) 96px' }}>
        <StepsBreadcrumb />
        <div className="checkout-layout">
          {/* Left column */}
          <div style={{ flex: 1, minWidth: 0 }}>
            <ShippingSection isGuest={isGuest} form={form} setForm={setForm} deliveryMethod={deliveryMethod} />
            <InvoiceSection invoiceType={invoiceType} setInvoiceType={setInvoiceType} invoiceData={invoiceData} setInvoiceData={setInvoiceData} />
            <PaymentSection selected={payment} onChange={setPayment} />
            {/* Mobile CTA */}
            <div className="mobile-cta">
              <button onClick={handleSubmit} disabled={submitting || pageState === 'submitting'} style={{
                width: '100%', height: 48, background: submitting || pageState === 'submitting' ? 'var(--ink-300)' : 'var(--brand)', color: '#fff',
                border: 'none', font: '500 16px/1 var(--font-sans)', letterSpacing: '.04em', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                {(submitting || pageState === 'submitting') && <Spinner />}
                {(submitting || pageState === 'submitting') ? '處理中…' : '確認送出'}
              </button>
            </div>
          </div>
          {/* Right sidebar */}
          <div className="sidebar-col" style={{ width: 320, flexShrink: 0 }}>
            <OrderSidebar
              deliveryFee={deliveryFee} couponDiscount={couponDiscount} pointsDiscount={pointsDiscount}
              submitting={submitting || pageState === 'submitting'} onSubmit={handleSubmit}
            />
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
