// ─── Toast ──────────────────────────────────────────────────────────────────

function ToastStack({ toasts }) {
  const cs = {
    success: { bg: '#f0f9eb', border: '#c2e7b0', color: '#67C23A' },
    error:   { bg: '#fef0f0', border: '#fbc4c4', color: '#F56C6C' },
    warning: { bg: '#fdf6ec', border: '#f5dab1', color: '#E6A23C' },
    info:    { bg: '#ecf5ff', border: '#b3d8ff', color: '#409EFF' },
  };
  return (
    <div style={{ position: 'fixed', top: 64, right: 24, zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8, pointerEvents: 'none' }}>
      {toasts.map(t => {
        const c = cs[t.type] || cs.info;
        return (
          <div key={t.id} style={{ background: c.bg, border: `1px solid ${c.border}`, color: c.color, padding: '10px 16px', fontSize: 14, boxShadow: '0 2px 8px rgba(0,0,0,.08)', minWidth: 220, maxWidth: 360 }}>
            {t.msg}
          </div>
        );
      })}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = React.useState([]);
  const show = (msg, type = 'success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2800);
  };
  return { toasts, show };
}

// ─── SocialButton ───────────────────────────────────────────────────────────

function SocialButton({ platform, loading, disabled, onClick }) {
  const cfg = {
    LINE:     { bg: '#06C755', color: '#fff', border: 'none', logo: <LineLogoWhite size={18} />, label: '以 LINE 登入',     loadingLabel: '正在連接 LINE...' },
    Google:   { bg: '#fff', color: '#303133', border: '1px solid #DCDFE6', logo: <GoogleLogo size={18} />, label: '以 Google 登入',   loadingLabel: '正在連接 Google...' },
    Facebook: { bg: '#1877F2', color: '#fff', border: 'none', logo: <FacebookLogo size={18} />, label: '以 Facebook 登入', loadingLabel: '正在連接 Facebook...' },
  }[platform];

  return (
    <button
      onClick={onClick}
      disabled={disabled || loading}
      style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
        width: '100%', height: 44, borderRadius: 0,
        background: disabled ? '#F5F7FA' : cfg.bg,
        color: disabled ? '#C0C4CC' : cfg.color,
        border: disabled ? '1px solid #DCDFE6' : cfg.border,
        fontSize: 14, fontFamily: 'Noto Sans TC, sans-serif',
        cursor: disabled || loading ? 'not-allowed' : 'pointer',
        opacity: loading ? 0.8 : 1,
        transition: 'opacity .15s',
      }}
    >
      {!disabled && !loading && cfg.logo}
      {loading ? cfg.loadingLabel : cfg.label}
    </button>
  );
}

  const [tab, setTab] = React.useState('login');
  const [showPw, setShowPw] = React.useState(false);
  const [loginState, setLoginState] = React.useState('default'); // default | error
  const [loadingPlatform, setLoadingPlatform] = React.useState(null);
  const { toasts, show: showToast } = useToast();

  const handleSocialClick = (platform) => {
    setLoadingPlatform(platform);
    setTimeout(() => {
      setLoadingPlatform(null);
      showToast('登入已取消，請重試或使用 Email 登入', 'warning');

  return (
    <div style={{ minHeight: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-start', padding: '48px 16px 40px', background: '#F5F7FA' }}>
      <div style={{ marginBottom: 32, textAlign: 'center' }}>
        <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: 2 }}>EVOMNI</div>
        <div style={{ fontSize: 12, color: '#909399', marginTop: 4 }}>商店購物網</div>
      </div>

      <div style={{ background: '#fff', border: '1px solid #DCDFE6', width: '100%', maxWidth: 400, padding: '0 32px 32px' }}>
        {/* Tabs */}
        <div style={{ display: 'flex', borderBottom: '1px solid #DCDFE6', marginBottom: 28 }}>
          {[['login','登入'],['register','註冊']].map(([id, label]) => (
            <button key={id} onClick={() => { setTab(id); setShowPw(false); setLoginState('default'); }} style={{
              flex: 1, height: 48, background: 'none', border: 'none',
              borderBottom: tab === id ? '2px solid #409EFF' : '2px solid transparent',
              color: tab === id ? '#409EFF' : '#606266',
              fontSize: 15, fontWeight: tab === id ? 700 : 400,
              cursor: 'pointer', fontFamily: 'Noto Sans TC, sans-serif',
              marginBottom: -1,
            }}>{label}</button>
          ))}
        </div>

        {tab === 'login' ? (
          <>
            <div style={{ marginBottom: 16 }}>
              <label style={{ display: 'block', fontSize: 13, color: '#606266', marginBottom: 6 }}>電子信箱</label>
              <input type="email" placeholder="請輸入您的電子信箱"
                style={{ ...baseInput, borderColor: loginState === 'error' ? '#F56C6C' : '#DCDFE6' }} />
            </div>
            <div style={{ marginBottom: 8 }}>
              <label style={{ display: 'block', fontSize: 13, color: '#606266', marginBottom: 6 }}>密碼</label>
              <div style={{ position: 'relative' }}>
                <input type={showPw ? 'text' : 'password'} placeholder="請輸入密碼"
                  style={{ ...baseInput, paddingRight: 40, borderColor: loginState === 'error' ? '#F56C6C' : '#DCDFE6' }} />
                <button onClick={() => setShowPw(!showPw)} style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', padding: 0, display: 'flex' }}>
                  <EyeIcon open={showPw} />
                </button>
              </div>
              {loginState === 'error' && (
                <div style={{ fontSize: 12, color: '#F56C6C', marginTop: 4 }}>電子信箱或密碼不正確，請重試</div>
              )}
            </div>
            <div style={{ textAlign: 'right', marginBottom: 20 }}>
              <button style={{ ...btn.text, fontSize: 13, color: '#909399' }}>忘記密碼？</button>
            </div>
            <button onClick={() => setLoginState('error')} style={btn.primaryLg}>登入</button>
            <div style={{ textAlign: 'center', marginTop: 14, fontSize: 13, color: '#606266' }}>
              還沒有帳號？
              <button onClick={() => setTab('register')} style={{ ...btn.text, fontSize: 13 }}>立即註冊</button>
            </div>
          </>
        ) : (
          <>
            <div style={{ marginBottom: 16 }}>
              <label style={{ display: 'block', fontSize: 13, color: '#606266', marginBottom: 6 }}>電子信箱</label>
              <input type="email" placeholder="請輸入您的電子信箱" style={baseInput} />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: 'block', fontSize: 13, color: '#606266', marginBottom: 6 }}>密碼</label>
              <div style={{ position: 'relative' }}>
                <input type={showPw ? 'text' : 'password'} placeholder="請設定密碼"
                  style={{ ...baseInput, paddingRight: 40 }} />
                <button onClick={() => setShowPw(!showPw)} style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', padding: 0, display: 'flex' }}>
                  <EyeIcon open={showPw} />
                </button>
              </div>
              <div style={{ fontSize: 12, color: '#909399', marginTop: 4 }}>密碼長度需介於 8-16 字元，且包含英文與數字</div>
            </div>
            <button style={btn.primaryLg}>建立帳號</button>
            <div style={{ textAlign: 'center', marginTop: 14, fontSize: 13, color: '#606266' }}>
              已有帳號？
              <button onClick={() => setTab('login')} style={{ ...btn.text, fontSize: 13 }}>立即登入</button>
            </div>
          </>
        )}

        {/* Divider */}
        <div style={{ display: 'flex', alignItems: 'center', margin: '24px 0', gap: 12 }}>
          <div style={{ flex: 1, height: 1, background: '#DCDFE6' }} />
          <span style={{ fontSize: 13, color: '#909399' }}>或</span>
          <div style={{ flex: 1, height: 1, background: '#DCDFE6' }} />
        </div>

        {/* Social buttons */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {platforms.map(p => (
            <SocialButton
              key={p}
              platform={p}
              loading={loadingPlatform === p}
              disabled={loadingPlatform !== null && loadingPlatform !== p}
              onClick={() => handleSocialClick(p)}
            />
          ))}
        </div>
      </div>

      <ToastStack toasts={toasts} />
    </div>
  );
}

// ─── Screen 2: Email 補全頁 ──────────────────────────────────────────────────

function Screen2() {
  const [phase, setPhase] = React.useState('input'); // input | sending | sent
  const [countdown, setCountdown] = React.useState(60);
  const timerRef = React.useRef(null);
  const { toasts, show: showToast } = useToast();

  React.useEffect(() => {
    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, []);

  const handleSend = () => {
    setPhase('sending');
    setTimeout(() => {
      setPhase('sent');
      setCountdown(60);
      let n = 60;
      timerRef.current = setInterval(() => {
        n--;
        setCountdown(n);
        if (n <= 0) clearInterval(timerRef.current);
      }, 1000);
    }, 1500);
  };

  const handleResend = () => {
    setCountdown(60);
    let n = 60;
    if (timerRef.current) clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      n--;
      setCountdown(n);
      if (n <= 0) clearInterval(timerRef.current);
    }, 1000);
    showToast('驗證信已重新發送至 example@gmail.com', 'success');
  };

  return (
    <div style={{ minHeight: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-start', padding: '48px 16px 40px', background: '#F5F7FA' }}>
      <div style={{ background: '#fff', border: '1px solid #DCDFE6', width: '100%', maxWidth: 400, padding: 32 }}>

        {/* Platform connected badge */}
        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 24 }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: '#f0fdf4', border: '1px solid #bbf7d0', borderRadius: 9999, padding: '6px 16px' }}>
            <div style={{ width: 22, height: 22, background: '#06C755', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <LineLogoWhite size={14} />
            </div>
            <span style={{ fontSize: 13, color: '#16a34a', fontWeight: 500 }}>已連接 LINE</span>
            <CheckIcon />
          </div>
        </div>

        {phase === 'input' || phase === 'sending' ? (
          <>
            <h1 style={{ fontSize: 20, fontWeight: 700, textAlign: 'center', marginBottom: 8 }}>您好，王小明！</h1>
            <p style={{ fontSize: 14, color: '#606266', textAlign: 'center', marginBottom: 28, lineHeight: 1.7 }}>
              為了完成帳號建立，請提供您的 Email 地址。
            </p>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: 'block', fontSize: 13, color: '#606266', marginBottom: 6 }}>電子信箱</label>
              <input type="email" placeholder="請輸入您的 Email 地址" style={baseInput} />
            </div>
            <button onClick={handleSend} disabled={phase === 'sending'} style={{ ...btn.primaryLg, opacity: phase === 'sending' ? 0.75 : 1, cursor: phase === 'sending' ? 'wait' : 'pointer' }}>
              {phase === 'sending' ? '發送中...' : '發送驗證信'}
            </button>
          </>
        ) : (
          <>
            <h1 style={{ fontSize: 20, fontWeight: 700, textAlign: 'center', marginBottom: 16 }}>驗證信已發送</h1>
            <div style={{ background: '#f0f9eb', border: '1px solid #c2e7b0', padding: '16px', marginBottom: 20, textAlign: 'center' }}>
              <div style={{ fontSize: 13, color: '#606266', marginBottom: 4 }}>驗證信已發送至</div>
              <div style={{ fontSize: 14, color: '#409EFF', fontWeight: 500 }}>example@gmail.com</div>
            </div>
            <p style={{ fontSize: 13, color: '#606266', textAlign: 'center', marginBottom: 20, lineHeight: 1.7 }}>
              請前往您的信箱點擊驗證連結，完成帳號建立。
            </p>
            <div style={{ textAlign: 'center', fontSize: 13, color: '#606266', marginBottom: 12 }}>
              沒有收到？請確認垃圾郵件資料夾，或
            </div>
            <button onClick={countdown > 0 ? undefined : handleResend} disabled={countdown > 0} style={countdown > 0 ? btn.disabledLg : btn.plainLg}>
              {countdown > 0 ? `重新發送（${countdown} 秒後可重送）` : '重新發送驗證信'}
            </button>
          </>
        )}

function Screen3() {
  const [showPw, setShowPw] = React.useState(false);
  const [state, setState] = React.useState('default'); // default | loading | error | locked
  const [remaining, setRemaining] = React.useState(3);
  const { toasts, show: showToast } = useToast();

  const handleConfirm = () => {
    setState('loading');
    setTimeout(() => {
      const left = remaining - 1;
      if (left <= 0) {
        setState('locked');
        setRemaining(0);
      } else {
        setState('error');
        setRemaining(left);
      }
    }, 1500);
  };

  const handleSendReset = () => {
    showToast('密碼重設信已發送，請查收 Email 後回來繼續操作', 'info');
  };

  return (
    <div style={{ minHeight: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-start', padding: '48px 16px 40px', background: '#F5F7FA' }}>
      <div style={{ background: '#fff', border: '1px solid #DCDFE6', width: '100%', maxWidth: 400, padding: 32 }}>

          您的 LINE 帳號的 Email（<strong style={{ color: '#303133' }}>te***@gmail.com</strong>）在我們系統中已有一個帳號。
        </p>
        <p style={{ fontSize: 13, color: '#909399', textAlign: 'center', marginBottom: 24, lineHeight: 1.7 }}>
          連結後，您可以用 LINE 或 Email / 密碼兩種方式登入。
        </p>

        {/* Locked alert */}
        {state === 'locked' && (
          <div style={{ background: '#fdf6ec', border: '1px solid #f5dab1', padding: '12px 16px', marginBottom: 20, fontSize: 13, color: '#E6A23C', lineHeight: 1.6 }}>
            帳號已暫時鎖定 30 分鐘，請稍後再試或使用密碼重設功能。
          </div>
        )}

        {/* Password field */}
        <div style={{ marginBottom: 8 }}>
          <label style={{ display: 'block', fontSize: 13, color: '#606266', marginBottom: 6 }}>現有帳號密碼</label>
          <div style={{ position: 'relative' }}>
            <input
              type={showPw ? 'text' : 'password'}
              placeholder="請輸入您帳號的密碼"
              disabled={state === 'locked'}
              style={{ ...baseInput, paddingRight: 40, borderColor: state === 'error' ? '#F56C6C' : '#DCDFE6', background: state === 'locked' ? '#F5F7FA' : '#fff', color: state === 'locked' ? '#C0C4CC' : '#303133' }}
            />
            <button onClick={() => setShowPw(!showPw)} style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', padding: 0, display: 'flex' }}>
              <EyeIcon open={showPw} />
            </button>
          </div>
          {state === 'error' && (
            <div style={{ fontSize: 12, color: '#F56C6C', marginTop: 4 }}>
              密碼不正確，您還有 {remaining} 次嘗試機會
            </div>
          )}
        </div>

        <div style={{ textAlign: 'right', marginBottom: 24 }}>
          <button onClick={handleSendReset} style={{ ...btn.text, fontSize: 13, color: '#909399' }}>不記得密碼？發送密碼重設信</button>
        </div>

        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={() => showToast('已取消，OAuth 授權已清除，返回登入頁', 'info')} style={{ ...btn.plain, flex: 1 }}>取消，不綁定</button>
          <button
            onClick={state !== 'locked' && state !== 'loading' ? handleConfirm : undefined}
            disabled={state === 'locked' || state === 'loading'}
            style={{ flex: 1, ...btn.primary, opacity: state === 'loading' ? 0.75 : 1, cursor: state === 'locked' ? 'not-allowed' : state === 'loading' ? 'wait' : 'pointer', background: state === 'locked' ? '#C0C4CC' : '#303133', borderColor: state === 'locked' ? '#C0C4CC' : '#303133' }}
          >
            {state === 'loading' ? '驗證中...' : '確認綁定'}
          </button>
        </div>
      </div>

      <ToastStack toasts={toasts} />
    </div>
  );
}

  const hasPassword = false;

  const platformDef = [
    {
      id: 'LINE',
      badge: <div style={{ width: 32, height: 32, background: '#06C755', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><LineLogoWhite size={16} /></div>,

    },
    {

    },

  const handleUnlink = (id) => { setDialog(id); };
  const confirmUnlink = () => {

  };
  const handleLink = (id) => {
    setOperating(id);
    setTimeout(() => {
      setLinks(prev => ({ ...prev, [id]: { linked: true, name: `${id} 用戶`, lastOnly: false } }));
      setOperating(null);
      showToast(`${id} 帳號已成功連結！`, 'success');
    }, 1200);
  };

  return (
    <div>
      {/* 純社群帳號引導 */}
      {!hasPassword && (
        <div style={{ background: '#ecf5ff', border: '1px solid #b3d8ff', padding: '12px 16px', marginBottom: 20, display: 'flex', alignItems: 'flex-start', gap: 10, fontSize: 13, color: '#606266' }}>

          <div style={{ flex: 1, lineHeight: 1.7 }}>

        </div>
      )}

      {/* Card */}
      <div style={{ background: '#fff', border: '1px solid #DCDFE6' }}>
        <div style={{ padding: '16px 20px', borderBottom: '1px solid #DCDFE6' }}>
          <h2 style={{ fontSize: 16, fontWeight: 700 }}>社群帳號連結</h2>
        </div>
        <div>
          {platformDef.map((p, i) => {
            const info = links[p.id];
            const linkedCount = Object.values(links).filter(l => l.linked).length;
            const isLast = info.linked && linkedCount === 1 && !hasPassword;
            const isOp = operating === p.id;
            return (
              <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '18px 20px', borderBottom: i < platformDef.length - 1 ? '1px solid #F5F7FA' : 'none' }}>
                {p.badge}
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>{p.id}</div>
                  {info.linked ? (
                    <div style={{ fontSize: 13, color: '#67C23A', marginTop: 2 }}>已連結（{info.name}）</div>
                  ) : (
                    <div style={{ fontSize: 13, color: '#909399', marginTop: 2 }}>尚未連結</div>
                  )}
                </div>
                {info.linked ? (
                  <button
                    onClick={() => !isLast && !isOp && handleUnlink(p.id)}
                    title={isLast ? '無法解除連結，因為您目前沒有設定帳號密碼。請先設定密碼後再解除連結。' : ''}
                    style={{ ...btn.textDanger, cursor: isLast ? 'not-allowed' : 'pointer', color: isLast ? '#C0C4CC' : '#F56C6C', fontSize: 13 }}
                  >
                    {isOp ? '解除中...' : '解除連結'}
                  </button>
                ) : (
                  <button onClick={() => !isOp && handleLink(p.id)} style={{ ...btn.plain, height: 32, padding: '0 12px', fontSize: 13, opacity: isOp ? 0.7 : 1 }}>

            );
          })}
        </div>
      </div>

      {/* Unlink dialog */}
      {dialog && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 2000 }}>
          <div style={{ background: '#fff', width: 440, maxWidth: '90vw', border: '1px solid #DCDFE6' }}>
            <div style={{ padding: '16px 20px', borderBottom: '1px solid #DCDFE6', fontSize: 16, fontWeight: 700 }}>
              確定要解除 {dialog} 帳號的連結嗎？
            </div>
            <div style={{ padding: 20, fontSize: 14, color: '#606266', lineHeight: 1.8 }}>
              解除後，您將無法再使用此 {dialog} 帳號登入。請確認您有其他登入方式（Email / 密碼 或 其他社群帳號）可以繼續使用帳號。

            <div style={{ padding: '12px 20px', borderTop: '1px solid #DCDFE6', display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
              <button style={btn.plain} onClick={() => setDialog(null)}>取消</button>
              <button style={{ ...btn.primary, background: '#F56C6C', borderColor: '#F56C6C' }} onClick={confirmUnlink}>確定解除連結</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

              {[
                { id: 'both',        label: '同時顯示 Email 登入和社群帳號登入（預設）' },
                { id: 'social-only', label: '僅顯示社群帳號登入（關閉 Email / 密碼登入）' },
              ].map(opt => (
                <label key={opt.id} style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', fontSize: 14 }}>
                  <input type="radio" name="loginMode" value={opt.id} checked={loginMode === opt.id} onChange={() => setLoginMode(opt.id)} />
                  {opt.label}
                </label>
              ))}
            </div>
            {loginMode === 'social-only' && (
              <div style={{ background: '#fdf6ec', border: '1px solid #f5dab1', padding: '12px 16px', marginTop: 14, fontSize: 13, color: '#E6A23C', lineHeight: 1.6 }}>
                關閉 Email 登入後，若消費者沒有 LINE / Google / Facebook 帳號將無法登入。請確認此設定符合您的客群需求。
              </div>
            )}
          </div>

          <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
            <button onClick={() => showToast('設定已儲存', 'success')} style={btn.primary}>儲存顯示設定</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Screen Picker ──────────────────────────────────────────────────────────

const SCREENS = [
  { id: 's1', label: 'Screen 1：前台登入頁',         group: '前台消費者端' },
  { id: 's2', label: 'Screen 2：Email 補全頁',        group: '前台消費者端' },
  { id: 's3', label: 'Screen 3：帳號合併確認頁',     group: '前台消費者端' },
  { id: 's4', label: 'Screen 4：帳號設定（社群連結）', group: '後台管理端' },
  { id: 's5', label: 'Screen 5：後台憑證設定',        group: '後台管理端' },
];

// ─── App ────────────────────────────────────────────────────────────────────

function App() {
  const [active, setActive] = React.useState('s1');
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const { toasts, show: showToast } = useToast();

  const isAdmin = active === 's4' || active === 's5';

  const breadcrumbs = {
    s4: [{ label: '全域設定', page: 'gs-system' }, { label: '會員中心', page: 'members' }, '帳號設定'],
    s5: [{ label: '全域設定', page: 'gs-system' }, { label: '電商進階設定', page: 'gs-advanced' }, '第三方登入設定'],
  };

  const activePage = active === 's4' ? 'member-settings' : 'gs-advanced';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>

      {/* Screen picker bar */}
      <div style={{ background: '#fff', borderBottom: '1px solid #DCDFE6', padding: '0 16px', display: 'flex', alignItems: 'stretch', flexShrink: 0, overflowX: 'auto' }}>
        <div style={{ display: 'flex', alignItems: 'center', paddingRight: 16, borderRight: '1px solid #F0F0F0', marginRight: 8, flexShrink: 0 }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: '#909399', whiteSpace: 'nowrap' }}>第三方登入 Prototype</span>
        </div>
        {['前台消費者端', '後台管理端'].map(group => {
          const gs = SCREENS.filter(s => s.group === group);
          return (
            <div key={group} style={{ display: 'flex', alignItems: 'center' }}>
              <span style={{ fontSize: 11, color: '#C0C4CC', padding: '0 8px 0 4px', whiteSpace: 'nowrap', borderRight: '1px dotted #DCDFE6', marginRight: 2 }}>{group}</span>
              {gs.map(s => (
                <button key={s.id} onClick={() => setActive(s.id)} style={{
                  height: 44, padding: '0 14px', background: 'none', border: 'none',
                  borderBottom: active === s.id ? '2px solid #409EFF' : '2px solid transparent',
                  color: active === s.id ? '#409EFF' : '#606266',
                  fontSize: 12, fontWeight: active === s.id ? 700 : 400,
                  cursor: 'pointer', fontFamily: 'Noto Sans TC, sans-serif', whiteSpace: 'nowrap',
                  marginBottom: -1,
                }}>
                  {s.label}
                </button>
              ))}
            </div>
          );
        })}
      </div>

      {/* Content area */}
      {isAdmin ? (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          <Header
            breadcrumbs={breadcrumbs[active]}
            onNavigate={() => {}}
            onToggleSidebar={() => setSidebarCollapsed(!sidebarCollapsed)}
          />
          <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
            <Sidebar
              collapsed={sidebarCollapsed}
              currentPage={activePage}
              onNavigate={() => {}}
            />
            <main style={{ flex: 1, overflow: 'auto', background: '#F5F7FA' }}>
              {active === 's4' && (
                <div style={{ padding: 24 }}>
                  <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 24 }}>帳號設定</h1>
                  <SocialLinkCard showToast={showToast} />
                </div>
              )}
              {active === 's5' && <AdminCredentialsScreen showToast={showToast} />}
            </main>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, overflow: 'auto', background: '#F5F7FA' }}>
          {active === 's1' && <Screen1 />}
          {active === 's2' && <Screen2 />}
          {active === 's3' && <Screen3 />}
        </div>
      )}

      <ToastStack toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
