function WarnIcon({ color = ORANGE, size = 12 }) {

}

  return <span style={{ width: 6, height: 6, borderRadius: '50%', background: color, display: 'inline-block', flexShrink: 0 }} />;
}

}

// ─── StatusBadge ──────────────────────────────────────────────────────────────
function StatusBadge({ status }) {
  const cfg = {
    set:      { label: '已設定', bg: '#F0F9EB', border: '#C2E7B0', color: GREEN,  icon: <DotIcon color={GREEN}/> },
    unset:    { label: '未設定', bg: '#FEF0E6', border: '#F5DAB1', color: ORANGE, icon: <WarnIcon color={ORANGE}/> },
    disabled: { label: '停用',   bg: '#F4F4F5', border: '#E9E9EB', color: GRAY,   icon: <DotIcon color={GRAY}/> },
  };
  const c = cfg[status] || cfg.unset;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '3px 10px', borderRadius: 9999, background: c.bg, border: `1px solid ${c.border}`, fontSize: 12, color: c.color, fontWeight: 500, whiteSpace: 'nowrap' }}>
      {c.icon}{c.label}
    </span>
  );
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function useToastLocal() {
  const [list, setList] = React.useState([]);
  const show = (msg, type = 'success') => {
    const id = Date.now();
    setList(t => [...t, { id, msg, type }]);
    setTimeout(() => setList(t => t.filter(x => x.id !== id)), 2800);
  };
  return { list, show };
}
function ToastList({ list }) {
  const colors = {
    success: { bg: '#f0f9eb', border: '#c2e7b0', color: GREEN },
    error:   { bg: '#fef0f0', border: '#fbc4c4', color: RED },
    info:    { bg: '#ecf5ff', border: '#b3d8ff', color: BLUE },
  };
  return (
    <div style={{ position: 'fixed', top: 64, right: 24, zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8, pointerEvents: 'none' }}>
      {list.map(t => {
        const c = colors[t.type] || colors.info;
        return (
          <div key={t.id} style={{ background: c.bg, border: `1px solid ${c.border}`, borderRadius: 3, color: c.color, padding: '10px 16px', fontSize: 14, boxShadow: '0 2px 8px rgba(0,0,0,.08)', minWidth: 240 }}>
            {t.msg}
          </div>
        );
      })}
    </div>
  );
}

// ─── ConfirmModal ─────────────────────────────────────────────────────────────
function ConfirmModal({ visible, title, body, confirmLabel, confirmDanger, onConfirm, onCancel }) {
  if (!visible) return null;
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 8000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ background: WHITE, width: 420, borderRadius: 4, boxShadow: '0 8px 32px rgba(0,0,0,0.18)', padding: '28px 28px 24px' }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: TEXT, marginBottom: 12 }}>{title}</div>
        <div style={{ fontSize: 14, color: TEXT2, lineHeight: 1.7, marginBottom: 24 }}>{body}</div>
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10 }}>
          <button onClick={onCancel} style={{ height: 36, padding: '0 18px', background: WHITE, border: `1px solid ${BORDER}`, borderRadius: 0, cursor: 'pointer', fontSize: 14, color: TEXT }}>取消</button>
          <button onClick={onConfirm} style={{ height: 36, padding: '0 18px', background: confirmDanger ? RED : PURPLE, color: WHITE, border: 'none', borderRadius: 0, cursor: 'pointer', fontSize: 14, fontWeight: 500 }}>{confirmLabel || '確定'}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Maintenance Banner ───────────────────────────────────────────────────────

      <button onClick={() => onNavigate && onNavigate()} style={{ background: 'none', border: 'none', color: RED, textDecoration: 'underline', cursor: 'pointer', fontSize: 13, padding: 0 }}>前往維護模式設定</button>
    </div>
  );
}

// ─── Filter Bar ───────────────────────────────────────────────────────────────
const inputStyle = { height: 34, padding: '0 10px', border: `1px solid ${BORDER}`, borderRadius: 0, fontSize: 13, fontFamily: 'Noto Sans TC,sans-serif', color: TEXT, background: WHITE, outline: 'none' };
const selectStyle = { ...inputStyle, cursor: 'pointer', paddingRight: 24 };

function FilterBar({ statusFilter, searchQuery, onStatus, onSearch, onClear }) {
  return (
    <div style={{ background: WHITE, border: `1px solid ${BORDER}`, padding: '12px 16px', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <span style={{ fontSize: 13, color: TEXT2, whiteSpace: 'nowrap' }}>狀態</span>
        <select value={statusFilter} onChange={e => onStatus(e.target.value)} style={{ ...selectStyle, width: 110 }}>
          <option value="all">全部狀態</option>
          <option value="set">已設定</option>
          <option value="unset">未設定</option>
          <option value="disabled">停用</option>
        </select>
      </div>
      <div style={{ position: 'relative', flex: 1, minWidth: 180, maxWidth: 280 }}>
        <input
          value={searchQuery}
          onChange={e => onSearch(e.target.value)}
          placeholder="搜尋頁面名稱..."
          style={{ ...inputStyle, width: '100%', paddingRight: searchQuery ? 28 : 10 }}
        />
        {searchQuery && (
          <button onClick={() => onSearch('')} style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: GRAY, padding: 0, display: 'flex', fontSize: 14 }}>✕</button>
        )}
      </div>
    </div>

// ─── Page Table ───────────────────────────────────────────────────────────────
function PageTable({ filtered, all, onEdit, onPreview }) {
  const thStyle = { padding: '10px 14px', fontSize: 13, fontWeight: 700, color: TEXT, background: BG, borderBottom: `1px solid ${BORDER}`, textAlign: 'left', whiteSpace: 'nowrap' };
  const tdStyle = { padding: '12px 14px', fontSize: 14, color: TEXT, borderBottom: `1px solid ${BORDER}`, verticalAlign: 'middle' };

  if (filtered.length === 0) {
    return (
      <div style={{ background: WHITE, border: `1px solid ${BORDER}` }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              {['頁面名稱','狀態','路徑（網址）','操作'].map(h => (
                <th key={h} style={thStyle}>{h}</th>
              ))}
            </tr>
          </thead>
        </table>
        <div style={{ padding: '48px 0', textAlign: 'center' }}>
          <div style={{ fontSize: 15, fontWeight: 500, color: TEXT2, marginBottom: 8 }}>找不到符合條件的頁面</div>
          <div style={{ fontSize: 13, color: GRAY, marginBottom: 16 }}>請調整篩選條件或清除搜尋關鍵字</div>
          <button onClick={() => { onEdit && onEdit(null); }} style={{ display: 'none' }} />
        </div>
      </div>
    );
  }

  return (
    <div style={{ background: WHITE, border: `1px solid ${BORDER}`, overflowX: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 720 }}>
        <thead>
          <tr>
            {['頁面名稱','類型','狀態','路徑（網址）','操作'].map(h => (
              <th key={h} style={thStyle}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {filtered.map((p, i) => (
            <PageRow key={p.id} page={p} odd={i % 2 === 0} onEdit={onEdit} onPreview={onPreview} />
          ))}
        </tbody>
      </table>
    </div>
  );
}

function PageRow({ page, odd, onEdit, onPreview }) {
  const [hover, setHover] = React.useState(false);
  const tdBase = { padding: '12px 14px', fontSize: 14, color: TEXT, borderBottom: `1px solid ${BORDER}`, verticalAlign: 'middle', background: hover ? '#F5F7FA' : (odd ? WHITE : '#FAFAFA'), transition: 'background 0.12s' };

  return (
    <tr onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}>
      <td style={{ ...tdBase, fontWeight: 500 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          {page.name}
        </div>
      </td>
      <td style={tdBase}><StatusBadge status={page.status}/></td>
      <td style={{ ...tdBase, color: GRAY, fontSize: 13, fontFamily: 'monospace' }}>{page.path}</td>
      <td style={tdBase}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <button onClick={() => onEdit(page.id)} style={{ background: 'none', border: 'none', color: BLUE, cursor: 'pointer', fontSize: 13, padding: 0 }}
            onMouseEnter={e => e.currentTarget.style.textDecoration = 'underline'}
            onMouseLeave={e => e.currentTarget.style.textDecoration = 'none'}
          >編輯</button>
          <button
            onClick={() => page.status !== 'unset' && onPreview(page)}
            title={page.status === 'unset' ? '尚未設定內容，無法預覽' : '在新分頁預覽'}
            style={{ background: 'none', border: 'none', cursor: page.status === 'unset' ? 'not-allowed' : 'pointer', display: 'flex', alignItems: 'center', gap: 4, color: page.status === 'unset' ? BORDER : GRAY, padding: 0, fontSize: 13 }}
          >
            <EyeIcon color={page.status === 'unset' ? BORDER : GRAY}/>預覽
          </button>
        </div>
      </td>
    </tr>
  );
}

// ─── Rich Text Editor ────────────────────────────────────────────────────────
const TOOLBAR_BTNS = ['粗體','斜體','H2','H3','清單','連結','圖片','表格'];

// ─── Inline LocaleTabs (matches components/LocaleTabs.jsx) ───────────────────
function SPLocaleTabs({ renderContent }) {
  const locales = ['繁中', 'EN'];
  const [active, setActive] = React.useState('繁中');
  return (
    <div style={{ background: WHITE }}>
      <div style={{ display: 'flex' }}>
        {locales.map(locale => {
          const isActive = locale === active;
          return (
            <button key={locale} onClick={() => setActive(locale)} style={{
              height: 40, padding: '0 20px',
              background: isActive ? '#EFF6FF' : WHITE,
              color: isActive ? BLUE : TEXT2,
              border: 'none',
              borderBottom: isActive ? `2px solid ${BLUE}` : 'none',
              cursor: 'pointer', fontFamily: 'Noto Sans TC,sans-serif',
              fontSize: 14, fontWeight: isActive ? 700 : 400,
            }}>{locale}</button>
          );
        })}
        <div style={{ flex: 1, background: WHITE }}/>
      </div>
      <div style={{ background: '#EFF6FF', padding: 24 }}>
        {renderContent(active)}
      </div>
    </div>
  );
}
function SPLocaleField({ label, required, helper, children }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 6 }}>
        {required && <span style={{ color: RED, fontSize: 13 }}>*</span>}
        <span style={{ fontSize: 14, color: TEXT }}>{label}</span>
      </div>
      {children}
      {helper && <div style={{ fontSize: 12, color: GRAY, marginTop: 4 }}>{helper}</div>}
    </div>
  );
}

// ─── Rich Text Editor ────────────────────────────────────────────────────────
function RichEditor({ content, onChange }) {

          <button key={b} onClick={() => setActiveBtn(b === activeBtn ? null : b)}

// ─── Edit Page (product-page layout) ─────────────────────────────────────────

  const [isDirty, setIsDirty]     = React.useState(false);
  const [activeTab, setActiveTab] = React.useState('basic');

  const [showLeave, setShowLeave] = React.useState(false);
  const [saving, setSaving]       = React.useState(false);

  const isLegal        = page.type === 'legal';

  const seoLen         = (form.seoDesc || '').length;

    if (saving) return;
    setSaving(true);

// ─── List View ────────────────────────────────────────────────────────────────
function ListView({ pages, maintenanceActive, onEdit, onMaintenanceBanner, toast }) {
  const [statusFilter, setStatusFilter] = React.useState('all');
  const [searchQuery,  setSearchQuery]  = React.useState('');

  const filtered = pages.filter(p => {
    if (statusFilter !== 'all' && p.status !== statusFilter) return false;
    if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });

  const handlePreview = (page) => {
    toast.show(`${page.name} 預覽已在新分頁開啟`, 'info');
  };

  const handleClear = () => { setStatusFilter('all'); setSearchQuery(''); };

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '24px' }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <h1 style={{ fontSize: 20, fontWeight: 700, color: TEXT }}>系統分頁</h1>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 13, color: GRAY }}>
            <span style={{ color: TEXT2 }}>網站設計</span>
            <span>/</span>
            <span>系統分頁</span>
          </div>
        </div>
      </div>

      <FilterBar
        statusFilter={statusFilter} searchQuery={searchQuery}
        onStatus={setStatusFilter} onSearch={setSearchQuery}
        onClear={handleClear}
      />

      {filtered.length === 0 ? (
        <div style={{ background: WHITE, border: `1px solid ${BORDER}`, padding: '48px', textAlign: 'center' }}>
          <div style={{ fontSize: 15, fontWeight: 500, color: TEXT2, marginBottom: 8 }}>找不到符合條件的頁面</div>
          <div style={{ fontSize: 13, color: GRAY, marginBottom: 16 }}>請調整篩選條件或清除搜尋關鍵字</div>
          <button onClick={handleClear} style={{ height: 34, padding: '0 16px', background: WHITE, border: `1px solid ${BORDER}`, borderRadius: 0, cursor: 'pointer', fontSize: 13, color: TEXT }}>清除篩選</button>
        </div>
      ) : (
        <PageTable filtered={filtered} all={pages} onEdit={onEdit} onPreview={handlePreview} />
      )}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [collapsed, setCollapsed]   = React.useState(false);
  const [navPage,   setNavPage]     = React.useState('system-pages');
  const [view,      setView]        = React.useState('list');
  const [editId,    setEditId]      = React.useState(null);
  const [pages,     setPages]       = React.useState(INIT_PAGES);
  const [maintActive, setMaintActive] = React.useState(false);
  const toast = useToastLocal();

  const handleEdit = (id) => { setEditId(id); setView('edit'); };
  const handleBack = () => { setEditId(null); setView('list'); };

  const handleSave = (updatedForm) => {
    setPages(prev => prev.map(p => {
      if (p.id !== updatedForm.id) return p;
      const isNowSet = updatedForm.content || updatedForm.errorTitle;
      return {
        ...p,
        ...updatedForm,
        status: updatedForm.enabled === false ? 'disabled' : 'set',
      };
    }));
  };

  const handleToggleMaintenance = (v) => {
    setMaintActive(v);
    if (v) toast.show('維護模式已啟用，訪客現在看到維護頁', 'warning');
    else   toast.show('維護模式已關閉，網站恢復正常', 'success');
  };

  const breadcrumbs = view === 'edit'
    ? ['網站設計', '系統分頁', pages.find(p => p.id === editId)?.name || '']
    : ['網站設計', '系統分頁'];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <Header
        breadcrumbs={breadcrumbs}
        onNavigate={setNavPage}
        onToggleSidebar={() => setCollapsed(c => !c)}
      />

      {/* Global maintenance banner */}
      {maintActive && <MaintenanceBanner onNavigate={() => { handleEdit('maintenance'); }} />}

      <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
        <Sidebar currentPage={navPage} onNavigate={setNavPage} collapsed={collapsed} />

        {view === 'list' ? (
          <ListView
            pages={pages}
            maintenanceActive={maintActive}
            onEdit={handleEdit}
            toast={toast}
          />
        ) : (
          <EditPage
            pageId={editId}
            pages={pages}
            onSave={handleSave}
            onBack={handleBack}
            maintenanceActive={maintActive}
            onToggleMaintenance={handleToggleMaintenance}
            toast={toast}
          />
        )}
      </div>

      <ToastList list={toast.list} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
