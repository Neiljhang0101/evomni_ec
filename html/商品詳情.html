// ─── Star Rating ──────────────────────────────────────────────────────────────
const StarRating = ({ value, count, size = 15, interactive, onRate }) => {
  const [hovered, setHovered] = useState(null);
  const display = hovered ?? value;
  const stars = Array.from({ length: 5 }, (_, i) => {
    if (display >= i + 1) return 'star';
    if (!interactive && display >= i + 0.5) return 'star_half';
    return 'star_border';
  });
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 2 }}>
      {stars.map((s, i) => (
        <span key={i} className="material-icons-outlined"
          style={{ fontSize: size, color: '#e6a23c', lineHeight: 1, cursor: interactive ? 'pointer' : 'default' }}
          onMouseEnter={() => interactive && setHovered(i + 1)}
          onMouseLeave={() => interactive && setHovered(null)}
          onClick={() => interactive && onRate && onRate(i + 1)}
        >{s}</span>
      ))}
      {count != null && (
        <span style={{ font: `400 ${size}px/1 var(--font-sans)`, color: 'var(--fg-subtle)', marginLeft: 6 }}>{count} 則評論</span>
      )}
    </div>
  );
};

// ─── Image Gallery ────────────────────────────────────────────────────────────
const ImageGallery = ({ images }) => {
  const [activeIdx, setActiveIdx] = useState(0);
  const [zoomPos, setZoomPos] = useState(null);
  const imgWrapRef = useRef(null);

  const handleMouseMove = (e) => {
    const rect = imgWrapRef.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
    const y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
    setZoomPos({ x, y });
  };

  return (
    <div style={{ position: 'relative' }}>
      {/* Main image */}
      <div
        ref={imgWrapRef}
        onMouseMove={handleMouseMove}
        onMouseLeave={() => setZoomPos(null)}
        style={{ position: 'relative', overflow: 'hidden', aspectRatio: '3/4', cursor: zoomPos ? 'crosshair' : 'zoom-in', background: '#f5f1ed' }}
      >
        <img
          src={images[activeIdx]}
          alt="商品主圖"
          style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}
        />
        {/* Lens indicator */}

        )}
      </div>

      {/* Zoom panel — floats to the right of the image column */}

        <div className="pdp-zoom-panel" style={{
          position: 'absolute', top: 0, left: 'calc(100% + 16px)',

// ─── Quantity Control ─────────────────────────────────────────────────────────
const QtyControl = ({ value, onChange, max, disabled }) => {
  const btnS = (active) => ({
    width: 36, height: 36, border: '1px solid var(--border)', background: 'none',
    color: active && !disabled ? 'var(--fg)' : 'var(--fg-disabled)',
    cursor: active && !disabled ? 'pointer' : 'not-allowed',
    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
  });
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', border: '1px solid var(--border)', width: 'fit-content' }}>
      <button style={btnS(value > 1)} onClick={() => !disabled && value > 1 && onChange(value - 1)} disabled={disabled || value <= 1}>
        <Icon name="remove" size={16} />
      </button>
      <span style={{ width: 48, textAlign: 'center', font: '400 16px/36px var(--font-sans)', color: disabled ? 'var(--fg-disabled)' : 'var(--fg)', borderLeft: '1px solid var(--border)', borderRight: '1px solid var(--border)' }}>{value}</span>

        <Icon name="add" size={16} />
      </button>
    </div>
  );
};

        {isSoldOut ? (
          <button
            onClick={() => SiteAlert.info('到貨通知', '補貨時將以 Email 通知您')}
            style={{ height: 48, padding: '0 24px', border: '1px solid var(--ink-900)', background: 'none', font: '500 15px/1 var(--font-sans)', color: 'var(--ink-900)', cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0 }}
          >到貨通知</button>
        ) : (
          <div style={{ display: 'flex', gap: 10, flexShrink: 0 }}>
            <button
              onClick={handleAddToCart}
              style={{ height: 48, padding: '0 20px', border: '1px solid var(--ink-900)', background: 'none', font: '500 15px/1 var(--font-sans)', color: 'var(--ink-900)', cursor: 'pointer', whiteSpace: 'nowrap' }}
            >加入購物車</button>
            <button
              onClick={handleBuyNow}
              style={{ height: 48, padding: '0 24px', border: 'none', background: 'var(--ink-900)', color: '#fff', font: '500 15px/1 var(--font-sans)', cursor: 'pointer', whiteSpace: 'nowrap' }}
            >立即購買</button>
          </div>
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
